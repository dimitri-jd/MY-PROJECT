<!DOCTYPE html>
<html> 
    <head>
        <title >Formularios</title>
    </head>
    <body>
        <form> 
            <input type="text" placeholder="escibre algo"> 
            <input type="email">
            <input type="password">
            <input type="checkbox">
            <input type="radio">
            <input type="file">
            <input type="date">
            <input type="submit">
        </form>

    </body>
</html>


<!-- el REQUIRED hace que el campo sea obligatorio -->
<!-- el NAME hace que el campo tenga un nombre para ser enviado al servidor -->
<!-- el PLACEHOLDER es un texto que aparece dentro del campo -->
<!-- el MINLENGTH hace que el campo tenga una longitud mínima -->
