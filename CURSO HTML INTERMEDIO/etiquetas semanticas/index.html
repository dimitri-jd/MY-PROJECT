<!DOCTYPE html>
<html>
    <head>
    <title>Etiquetas semanticas</title>
    <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header><!--Representa contenido introductorio, generalmente un conjunto de ayudas introductorias o de navegación. Puede contener elementos de encabezado, pero también un logotipo, un formulario de búsqueda, el nombre del autor y otros elementos.-->
            <nav><!--<-- Representa una sección de navegación del sitio web. -->
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Nosotros</a></li>
                    <li><a href="#">Contacto</a></li>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Nosotros</a></li>
                    <li><a href="#">Contacto</a></li>
                </ul>
            </nav>
        </header>
        <main> <!--Representa el contenido principal del cuerpo de un documento. El área de contenido principal consiste en contenido directamente relacionado con el tema central -->
            <section class="recipe-container"><!--Representa una sección de contenido principal del documento. Puede contener elementos como párrafos, imágenes, listas, etc. -->
            </section>
        </main>
        <aside></aside><!--Representa una parte de un documento cuyo contenido solo se relaciona indirectamente con el contenido principal. Los apartes suelen presentarse como barras laterales o cuadros de referencia.-->
        <section class="comments-container">

        </section>
        <footer>
            <p>copyright @ 2024 protegido por blabla</p>
        </footer>
    </body>
</html>
