<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Textarea</title>
        <link rel="stylesheet" href="styles.css">
    </head>
<body>
    <form>
    <h2>Formulario de contacto
    </h2>
        <div class="form_input" >
            <label>Nombre completo
            <input type="text" placeholder="Juan Perez">
            </label>
        </div>
        <div class="form_input">
            <label>Email
            <input type="email" placeholder="juan@ejemplo.com">
        </label>
        </div>
        <div class="form_input">
            <label>Mensaje
                <textarea  rows="8" placeholder="Escribe tu mensaje aqui..."></textarea>
            </label>
            </div>
            <div class="form_input">
            <label>Acepto los terminos y condiciones
                <input type="checkbox" class="checkbox">
            </label>
            </div>
    </form>
</body>
</html>
