<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,  initial-scale=1.0">
        <title>Textarea</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <form>
    <h2>Formulario de contacto
    </h2>

        <fieldset>    <!-- SIMPLE INPUTS -->
            <legend>INFORMACIÓN BÁSICA</legend>
        <div class="form_input" >
            <label>Nombre completo
            <input type="text" placeholder="Juan Perez">
            </label>
        </div>
        <div class="form_input">
            <label>Email
            <input type="email" placeholder="juan@ejemplo.com">
        </label>
        </div>
        <div class="form_input">
            <label>Asunto
                <input type="text" placeholder="Asunto del mensaje">
            </label>
        </div>
        </fieldset>

        
        <!-- SELECT Y OPCION-->
        <div class="form_input">
            <label>Tipo de usuario
            <select name="type_of_user">
                <option value="user1">Seguidor/a</option>
                <option value="user2">Empresa</option>
                <option value="user3">Otros</option>
            </select>
            </label>
        </div>

                <!-- DATALIST Y OPCION-->
                <div class="form_input">
            <label>referente
                <input list="referente" name="referente">
            <datalist id="referente" name="type_of_user" >
                <option value="Soy Dalto">Un creador de contenido</option>
                <option value="Una empresa">Una empresa del extranjero</option>
                <option value="Un amigo">me recomendo un amigo</option>
            </datalist>
            </label>
        </div>

        <!-- TEXTAREA-->
        <div class="form_input">
            <label>Mensaje
                <textarea  rows="8" placeholder="Escribe tu mensaje aqui..."></textarea>
            </label>
            </div>
            <div class="form_input">
            <label>Acepto los terminos y condiciones
                <input type="checkbox" class="checkbox">
            </label>
            </div>
        </form>
    </body>
</html>
